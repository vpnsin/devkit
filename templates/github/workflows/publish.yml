name: Publish to npm

# Publishes the package when a GitHub Release is published (release-please
# creates the release when its PR is merged). Requires an NPM_TOKEN repo secret
# (an npm automation token). Opt-in: NOT installed by `ladevconfig init` unless
# you pass --publish. For a private/scoped package, adjust `--access`.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
